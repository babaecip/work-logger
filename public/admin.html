<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 Work Logger — Daily Dashboard</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-dim: #8b949e;
            --accent: #58a6ff;
            --green: #3fb950;
            --red: #f85149;
            --yellow: #d29922;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .container { max-width: 960px; margin: 0 auto; padding: 24px; }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        h1 { font-size: 24px; font-weight: 600; }
        h1 span { color: var(--accent); }
        .date-nav {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .date-nav input {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
        }
        .date-nav button {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        .date-nav button:hover { opacity: 0.9; }
        .stats {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }
        .stat-card .number {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent);
        }
        .stat-card .label {
            font-size: 13px;
            color: var(--text-dim);
            margin-top: 4px;
        }
        .log-list { display: flex; flex-direction: column; gap: 12px; }
        .log-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            transition: border-color 0.2s;
        }
        .log-item:hover { border-color: var(--accent); }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .log-task {
            font-size: 16px;
            font-weight: 600;
        }
        .log-status {
            font-size: 12px;
            padding: 2px 10px;
            border-radius: 12px;
            font-weight: 500;
            text-transform: uppercase;
        }
        .status-completed { background: rgba(63,185,80,0.15); color: var(--green); }
        .status-in-progress { background: rgba(210,153,34,0.15); color: var(--yellow); }
        .status-failed { background: rgba(248,81,73,0.15); color: var(--red); }
        .log-summary {
            font-size: 14px;
            color: var(--text-dim);
            margin-bottom: 8px;
            line-height: 1.5;
        }
        .log-files {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }
        .log-file {
            background: rgba(88,166,255,0.1);
            color: var(--accent);
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
        }
        .log-time {
            font-size: 12px;
            color: var(--text-dim);
        }
        .log-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 8px;
            font-size: 12px;
            color: var(--text-dim);
        }
        .log-meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .complexity-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 11px;
        }
        .complexity-very-low { background: rgba(63,185,80,0.15); color: var(--green); }
        .complexity-low { background: rgba(88,166,255,0.15); color: var(--accent); }
        .complexity-medium { background: rgba(210,153,34,0.15); color: var(--yellow); }
        .complexity-high { background: rgba(248,81,73,0.15); color: var(--red); }
        .complexity-very-high { background: rgba(248,81,73,0.25); color: #ff7b72; }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }
        .empty-state .emoji { font-size: 48px; margin-bottom: 16px; }
        .empty-state p { font-size: 16px; }
        .date-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 20px;
        }
        .date-chip {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .date-chip:hover, .date-chip.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(88,166,255,0.1);
        }
        .refresh-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 <span>Work Logger</span> — Daily Dashboard</h1>
            <div class="date-nav">
                <input type="date" id="datePicker" />
                <button onclick="loadLogs()">Load</button>
                <button class="refresh-btn" onclick="loadAllDates()">🔄</button>
            </div>
        </header>

        <div id="dateChips" class="date-chips"></div>

        <div class="stats">
            <div class="stat-card">
                <div class="number" id="totalCount">0</div>
                <div class="label">Total Tasks</div>
            </div>
            <div class="stat-card">
                <div class="number" id="completedCount" style="color: var(--green)">0</div>
                <div class="label">Completed</div>
            </div>
            <div class="stat-card">
                <div class="number" id="failedCount" style="color: var(--red)">0</div>
                <div class="label">Failed</div>
            </div>
            <div class="stat-card">
                <div class="number" id="totalTokens">0</div>
                <div class="label">Total Tokens</div>
            </div>
            <div class="stat-card">
                <div class="number" id="totalDuration">0</div>
                <div class="label">Total Minutes</div>
            </div>
            <div class="stat-card">
                <div class="number" id="avgComplexity">-</div>
                <div class="label">Avg Complexity</div>
            </div>
        </div>

        <div id="logList" class="log-list">
            <div class="empty-state">
                <div class="emoji">📭</div>
                <p>No logs yet for this date.</p>
            </div>
        </div>
    </div>

    <script>
        const API = window.location.origin;
        const datePicker = document.getElementById('datePicker');
        const logList = document.getElementById('logList');

        // Set default to today
        datePicker.value = new Date().toISOString().split('T')[0];

        async function loadAllDates() {
            try {
                const res = await fetch(`${API}/api/work-log/all/dates`);
                const data = await res.json();
                const chips = document.getElementById('dateChips');
                chips.innerHTML = data.dates.map(d =>
                    `<span class="date-chip ${d === datePicker.value ? 'active' : ''}" onclick="selectDate('${d}')">${d}</span>`
                ).join('');
            } catch (e) {
                console.error('Failed to load dates', e);
            }
        }

        function selectDate(dateStr) {
            datePicker.value = dateStr;
            loadLogs();
        }

        async function loadLogs() {
            const date = datePicker.value;
            try {
                const res = await fetch(`${API}/api/work-log?date=${date}`);
                const data = await res.json();
                renderLogs(data.logs);
                updateStats(data.logs);
                loadAllDates();
            } catch (e) {
                logList.innerHTML = `<div class="empty-state"><div class="emoji">⚠️</div><p>Failed to load logs. Is the server running?</p></div>`;
            }
        }

        function updateStats(logs) {
            document.getElementById('totalCount').textContent = logs.length;
            document.getElementById('completedCount').textContent = logs.filter(l => l.status === 'completed').length;
            document.getElementById('failedCount').textContent = logs.filter(l => l.status === 'failed').length;
            
            // Calculate total tokens
            const totalTokens = logs.reduce((sum, l) => sum + (l.estimated_tokens || 0), 0);
            document.getElementById('totalTokens').textContent = totalTokens.toLocaleString();
            
            // Calculate total duration
            const totalDuration = logs.reduce((sum, l) => sum + (l.duration_minutes || 0), 0);
            document.getElementById('totalDuration').textContent = totalDuration;
            
            // Calculate average complexity
            const complexityMap = { 'very-low': 1, 'low': 2, 'medium': 3, 'high': 4, 'very-high': 5 };
            const complexityLabels = { 1: 'VL', 2: 'L', 3: 'M', 4: 'H', 5: 'VH' };
            const complexityValues = logs.map(l => complexityMap[l.complexity] || 3);
            const avgComplexity = complexityValues.length > 0 
                ? Math.round(complexityValues.reduce((a, b) => a + b, 0) / complexityValues.length)
                : 3;
            document.getElementById('avgComplexity').textContent = complexityLabels[avgComplexity] || 'M';
        }

        function renderLogs(logs) {
            if (logs.length === 0) {
                logList.innerHTML = `<div class="empty-state"><div class="emoji">📭</div><p>No logs yet for this date.</p></div>`;
                return;
            }
            logList.innerHTML = logs.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)).map(log => {
                const time = new Date(log.timestamp).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
                const statusClass = `status-${log.status}`;
                const files = (log.files || []).map(f => `<span class="log-file">${f}</span>`).join('');
                const complexityClass = `complexity-${log.complexity || 'medium'}`;
                const complexityLabel = log.complexity ? log.complexity.toUpperCase() : 'N/A';
                return `
                    <div class="log-item">
                        <div class="log-header">
                            <span class="log-task">${escHtml(log.task)}</span>
                            <span class="log-status ${statusClass}">${log.status}</span>
                        </div>
                        ${log.summary ? `<div class="log-summary">${escHtml(log.summary)}</div>` : ''}
                        ${files ? `<div class="log-files">${files}</div>` : ''}
                        <div class="log-meta">
                            <span class="log-meta-item">🌿 ${escHtml(log.git_branch || 'N/A')}</span>
                            <span class="log-meta-item"><span class="complexity-badge ${complexityClass}">${complexityLabel}</span></span>
                            ${log.repo_url ? `<span class="log-meta-item">🔗 <a href="${escHtml(log.repo_url)}" target="_blank" style="color: var(--accent); text-decoration: none;">${escHtml(log.repo_url)}</a></span>` : ''}
                            ${log.estimated_tokens ? `<span class="log-meta-item">📊 ${log.estimated_tokens} tokens</span>` : ''}
                            ${log.duration_minutes ? `<span class="log-meta-item">⏱️ ${log.duration_minutes} min</span>` : ''}
                        </div>
                        <div class="log-time">🕐 ${time}</div>
                    </div>
                `;
            }).join('');
        }

        function escHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Init
        loadLogs();
        loadAllDates();

        // Auto-refresh every 30s
        setInterval(loadLogs, 30000);
    </script>
</body>
</html>
